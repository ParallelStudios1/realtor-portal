name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Lets you trigger manually against a Vercel preview URL
  workflow_dispatch:
    inputs:
      base_url:
        description: 'BASE_URL to test against (e.g. https://realtor-portal-ten.vercel.app)'
        required: false
        default: ''

jobs:
  smoke:
    name: Smoke (prod URL)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install deps
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E
        env:
          BASE_URL: ${{ inputs.base_url || 'https://realtor-portal-ten.vercel.app' }}
        run: npm run e2e

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: admin/playwright-report
          retention-days: 7
